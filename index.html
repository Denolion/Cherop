<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercy Cherop | 22nd Birthday 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    overflow-x:hidden;
    background:linear-gradient(135deg,#ff4d6d,#ff8fa3,#ffb3c1);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    color:white;
    text-align:center;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.screen{
    display:none;
    min-height:100vh;
    padding:30px 20px;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active{
    display:flex;
}

.hero-img{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid white;
    margin:20px 0;
    box-shadow:0 0 30px rgba(255,255,255,.8);
}

h1{
    font-size:2rem;
    margin-bottom:10px;
}

h2{
    margin-bottom:10px;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#message{
    max-width:700px;
    margin:auto;
    text-align:left;
    line-height:1.8;
    background:rgba(255,255,255,.15);
    padding:20px;
    border-radius:20px;
    backdrop-filter:blur(8px);
    border-right:3px solid white;
    white-space:pre-wrap;
}

.hiddenBtn{
    display:none;
}

.firework{
    position:fixed;
    width:8px;
    height:8px;
    border-radius:50%;
    pointer-events:none;
}

.balloon{
    position:fixed;
    bottom:-100px;
    width:40px;
    height:55px;
    border-radius:50%;
    animation:floatBalloon 10s linear forwards;
}

@keyframes floatBalloon{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

.heart{
    position:fixed;
    font-size:25px;
    animation:heartFloat 6s linear forwards;
    pointer-events:none;
}

@keyframes heartFloat{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

.quote{
    margin-top:25px;
    font-style:italic;
    font-size:18px;
}

#liveTime{
    margin-top:10px;
    color:#fff;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">

    <h1>🎉 SHE IS OFFICIALLY 22 TODAY 🎉</h1>

    <h2>💖 Mercy Cherop 💖</h2>

    <h3 id="liveTime"></h3>

    <img src="herphoto.jpg" class="hero-img">

    <p style="font-size:18px;">
        🌸 Best Friend • Queen • Blessing 🌸
    </p>

    <p style="margin-top:15px;">
        Click below to begin your birthday surprise ✨
    </p>

    <button onclick="startExperience()">
        Start Celebration 🎂
    </button>

</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">

    <h2>💌 A Special Message From Dennis</h2>

    <br>

    <div id="message"></div>

    <p class="quote">
        "May your 22nd year be filled with unforgettable memories,
        limitless blessings, and beautiful adventures." ✨
    </p>

    <button onclick="showSecret()">
        Reveal Secret Gift 🎁
    </button>

    <button onclick="celebrate()">
        Launch Celebration 🎇
    </button>

    <button id="secretBtn" class="hiddenBtn"
        onclick="alert('Happy 22nd Birthday Mercy! 🎂❤️ You are loved, appreciated, valued and destined for greatness. May God bless every step of your journey. Keep shining Bestie! ✨💖')">
        🎉 Open Secret Surprise
    </button>

</div>

<script>

// Live clock
setInterval(()=>{
    let now=new Date();
    document.getElementById("liveTime").innerHTML=
    "🎂 Celebrating Mercy's 22nd Birthday • " +
    now.toLocaleTimeString();
},1000);

// Start experience
function startExperience(){
    document.getElementById("bgMusic").play();
    createHearts();

    document.getElementById("screen1").classList.remove("active");
    document.getElementById("screen2").classList.add("active");

    typeMessage();
}

// Typing message

const messageText=`Dear Mercy Cherop,

Today is not just another day; it is the celebration of an amazing soul turning 22. 🎂✨

You are one of the most genuine, caring, beautiful, and inspiring people I have ever known.

Your smile lights up rooms, your kindness touches hearts, and your presence makes life better for everyone lucky enough to know you.

As you begin this new chapter, I pray that every dream you carry in your heart finds its way into reality.

May God bless your journey with happiness, success, peace, good health, favor, and endless opportunities.

Whenever life gets difficult, remember how strong, intelligent, and capable you truly are.

Continue believing in yourself because greatness awaits you.

Thank you for being an incredible best friend and for creating memories worth cherishing.

Happy 22nd Birthday, Mercy. 🎉💖

May this year be your most beautiful one yet.

With love and appreciation,

– Dennis 💫`;

let i=0;

function typeMessage(){
    if(i<messageText.length){
        document.getElementById("message").innerHTML += messageText.charAt(i);
        i++;
        setTimeout(typeMessage,35);
    }
}

// Secret button
function showSecret(){
    document.getElementById("secretBtn").style.display="inline-block";
}

// Fireworks
function celebrate(){

    for(let i=0;i<200;i++){

        let fw=document.createElement("div");

        fw.className="firework";

        fw.style.left=Math.random()*100+"vw";
        fw.style.top=Math.random()*70+"vh";

        fw.style.background=
        `hsl(${Math.random()*360},100%,70%)`;

        document.body.appendChild(fw);

        let angle=Math.random()*360;
        let distance=100+Math.random()*150;

        fw.animate([
            {
                transform:'translate(0,0)',
                opacity:1
            },
            {
                transform:`translate(
                ${distance*Math.cos(angle*Math.PI/180)}px,
                ${distance*Math.sin(angle*Math.PI/180)}px
                )`,
                opacity:0
            }
        ],
        {
            duration:1500+Math.random()*1500,
            easing:'ease-out'
        });

        setTimeout(()=>{
            fw.remove();
        },3000);
    }

    createBalloons();
}

// Balloons
function createBalloons(){

    for(let i=0;i<22;i++){

        let b=document.createElement("div");

        b.className="balloon";

        b.style.left=Math.random()*100+"vw";

        b.style.background=
        `hsl(${Math.random()*360},80%,70%)`;

        document.body.appendChild(b);

        setTimeout(()=>{
            b.remove();
        },10000);
    }
}

// Floating Hearts
function createHearts(){

    setInterval(()=>{

        let heart=document.createElement("div");

        heart.className="heart";

        heart.innerHTML="💖";

        heart.style.left=Math.random()*100+"vw";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },6000);

    },500);
}

</script>

</body>
</html>
